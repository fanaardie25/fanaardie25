name: Generate Snake Animation

on:
  # Jalankan otomatis setiap 24 jam sekali
  schedule:
    - cron: "0 0 * * *" 
  
  # Memungkinkan kamu menjalankan script ini secara manual
  workflow_dispatch:
  
  # Otomatis jalan setiap kali ada push ke branch main
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Menghasilkan animasi ular dari kontribusi GitHub milikmu
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Mendorong (push) file svg yang dihasilkan ke branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
